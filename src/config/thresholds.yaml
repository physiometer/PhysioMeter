# Reference normative data for SD-band mobility zones.
#
# zone_defaults (required, top-level):
#   yellow_sd / red_sd - SD-multipliers used as the yellow and red zone boundaries (yellow_sd < red_sd).
#   descriptions       - Verbatim text rendered after the cutoff and reference lines in each zone message.
#
# Threshold tables (every other top-level key):
#   compare_as - higher_is_better (e.g. walking speed; lower values are worse) or lower_is_better.
#   unit       - Display unit appended to the cutoff value (e.g., "m/s", "sec").
#   decimals   - Decimal places to render for the cutoff value.
#   <sex>      - Male / Female maps of <age_bracket> → { mean, sd }.
#
# Zones are derived in interpretationEngine.js as mean ± yellow_sd × sd (yellow boundary)
# and mean ± red_sd × sd (red boundary), with the direction set by compare_as.
# Age brackets: 50-59, 60-69, 70-79, 80-89, 90+.

# Defaults follow the v2.1 Interpretation Charts and the figure on page 24 of
# the v2 Manual: green = >=mean, yellow = (mean - 1 SD, mean), red = <= mean - 1 SD.
# Note: the v2 Manual's prose on page 23 describes a wider green band at
# >= mean - 0.5 SD, which contradicts both the page-24 figure and the v2.1
# charts. Task Force confirmed v2.1 (yellow_sd: 0.0) as the intended encoding.
# See THRESHOLDS_DISCREPANCIES.md.
zone_defaults:
  yellow_sd: 0.0
  red_sd: 1.0
  descriptions:
    green: "The participant's performance is similar to others in the same age range and sex."
    yellow: "The participant is performing below normative data, which could be an early indicator of mobility changes, but may not be to a level that it is limiting their daily activities."
    red: "The participant likely has mobility issues that are limiting daily activities."

usual_walking_speed:
  compare_as: "higher_is_better"
  unit: "m/s"
  decimals: 2
  Male:
    "50-59": { mean: 1.31, sd: 0.16 }
    "60-69": { mean: 1.27, sd: 0.17 }
    "70-79": { mean: 1.18, sd: 0.20 }
    "80-89": { mean: 1.02, sd: 0.20 }
    "90+":   { mean: 0.91, sd: 0.17 }
  Female:
    "50-59": { mean: 1.26, sd: 0.17 }
    "60-69": { mean: 1.22, sd: 0.16 }
    "70-79": { mean: 1.12, sd: 0.20 }
    "80-89": { mean: 0.98, sd: 0.21 }
    "90+":   { mean: 0.76, sd: 0.21 }

