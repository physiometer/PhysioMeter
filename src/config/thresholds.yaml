# 30-Second Sit to Stand: means/SDs from the v2.1 chart and confirmed against the
# source paper (PMC10524633). The chart's printed zone-band columns for 30STS are
# internally inconsistent with the means/SDs in the same rows (e.g., Men 60-69
# prints green "20+" with mean 10.2), so PhysioMeter does NOT reproduce those
# printed bands. Bands are instead derived from mean/SD via the standard
# zone_defaults mechanism (yellow_sd: 0.0, red_sd: 1.0). See
# THRESHOLDS_DISCREPANCIES.md for the reasoning.
thirty_second_sit_to_stand:
  compare_as: "higher_is_better"
  unit: "repetitions"
  decimals: 0
  Male:
    "50-59": { mean: 13.9, sd: 3.9 }
    "60-69": { mean: 10.2, sd: 4.9 }  # TODO: verify -- non-monotonic with adjacent age brackets in v2.1
    "70-79": { mean: 14.0, sd: 5.8 }
    "80-89": { mean: 9.1,  sd: 6.1 }
    "90+":   { mean: 9.1,  sd: 4.2 }
  Female:
    "50-59": { mean: 14.3, sd: 6.9 }
    "60-69": { mean: 13.4, sd: 4.1 }
    "70-79": { mean: 11.6, sd: 5.3 }
    "80-89": { mean: 9.7,  sd: 4.2 }
    "90+":   { mean: 8.6,  sd: 3.7 }
