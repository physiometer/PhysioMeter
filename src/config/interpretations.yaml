# Interpretations evaluate clinical rules and produce summary messages.
#
# Rule types: when+then:skip, when+show_message, let, lookup_threshold, otherwise, check_interpretation.
# Severity: concern (red), caution (yellow), normal (green), info (gray).
# See conditionEngine.js for supported condition operators.

vitalSigns:
  label: "Vital Signs"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    # Skip if vitals are missing or incomplete. Oxygen saturation is optional;
    # if blank, eligibility is determined from pulse and BP alone.
    - when:
        any_of:
          - from_measurement: vitalSigns
            is_missing: true
          - from_measurement: vitalSigns.restingPulseRate
            is_missing: true
          - from_measurement: vitalSigns.bloodPressure
            is_missing: true
      then: skip

    # Check for ineligibility conditions
    - when:
        any_of:
          - from_measurement: vitalSigns.restingPulseRate
            is_greater_than: 100
          - from_measurement: vitalSigns.oxygenSaturation
            is_less_than: 90
          - from_measurement: vitalSigns.bloodPressure.systolic
            is_greater_than: 180
          - from_measurement: vitalSigns.bloodPressure.diastolic
            is_greater_than: 110
          - from_measurement: vitalSigns.bloodPressure.systolic
            is_less_than: 90
          - from_measurement: vitalSigns.bloodPressure.diastolic
            is_less_than: 60
      show_message:
        text: "This patient is ineligible for physical activity."
        severity: concern

    # If no ineligibility found, patient is eligible
    - otherwise:
        show_message:
          text: "This patient is eligible for physical activity."
          severity: normal

usualWalkingSpeed:
  label: "5 Meter Usual Walking Speed"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    - when:
        from_calculation: fiveMeterUsualWalkingSpeedMean
        is_missing: true
      then: skip

    # Convert mean time to walking speed (m/s)
    - let:
        walking_speed:
          from_calculation: fiveMeterUsualWalkingSpeedMean
          convert: time_to_speed
          distance_meters: 5

    # Fall risk
    - when:
        from_variable: walking_speed
        is_less_than: 0.76
      show_message:
        text: "Fall Risk, <0.76m/sec (Sn .65, Sp .71)"
        severity: concern

    # Frailty risk
    - when:
        from_variable: walking_speed
        is_less_than: 0.63
      show_message:
        text: "Frailty Risk, <0.63 m/sec (Sn .90, Sp .90)"
        severity: concern

    # Mobility classification by age/sex
    - lookup_threshold:
        value_from_variable: walking_speed
        table: usual_walking_speed
        patient_sex_from: measurement.sex
        patient_age_from: calculation.age

fastWalkingSpeed:
  label: "5 Meter Fast Walking Speed"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    - when:
        from_calculation: fiveMeterFastWalkingSpeedBest
        is_missing: true
      then: skip

    # Convert best time to walking speed (m/s)
    - let:
        walking_speed:
          from_calculation: fiveMeterFastWalkingSpeedBest
          convert: time_to_speed
          distance_meters: 5

    # Fall risk
    - when:
        from_variable: walking_speed
        is_less_than: 1.10
      show_message:
        text: "Fall Risk, <1.10 m/sec (Sn .76, Sp .60)"
        severity: concern

    # Mobility classification by age/sex
    - lookup_threshold:
        value_from_variable: walking_speed
        table: fast_walking_speed
        patient_sex_from: measurement.sex
        patient_age_from: calculation.age

thirtySecondSitToStand:
  label: "30 Second Sit to Stand"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    - when:
        from_calculation: thirtySecondSitToStandCount
        is_missing: true
      then: skip

    # Mobility classification by age/sex. Bands are SD-derived from mean/SD;
    # v2.1 chart's printed zone columns for 30STS are internally inconsistent
    # with the printed mean/SD and are not reproduced (see
    # THRESHOLDS_DISCREPANCIES.md).
    - lookup_threshold:
        value_from_calculation: thirtySecondSitToStandCount
        table: thirty_second_sit_to_stand
        patient_sex_from: measurement.sex
        patient_age_from: calculation.age

fourSquareStepTest:
  label: "Four Square Step Test"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    - when:
        from_calculation: fourSquareStepTestBest
        is_missing: true
      then: skip

    # Multiple fall risk
    - when:
        from_calculation: fourSquareStepTestBest
        is_at_least: 15
      show_message:
        text: "Multiple Fall risk >=15 (Sn .85, Sp .88)"
        severity: concern

    # Mobility classification by age/sex
    - lookup_threshold:
        value_from_calculation: fourSquareStepTestBest
        table: four_square_step_test
        patient_sex_from: measurement.sex
        patient_age_from: calculation.age

modifiedFourSquareStepTest:
  label: "Modified Four Square Step Test"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    - when:
        from_calculation: modifiedFourSquareStepTestBest
        is_missing: true
      then: skip

    - otherwise:
        show_message:
          text: "The Modified FSST has no published normative thresholds. Interpretation should be based on whether the patient was able to complete the test and clinician judgment."
          severity: info

timedUpAndGo:
  label: "Timed Up and Go (TUG)"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    - when:
        from_calculation: timedUpAndGoBest
        is_missing: true
      then: skip

    # Fall risk (per v2.1 chart): single >12.0 cut per sex, with sex-specific Sp.
    - when:
        all_of:
          - from_measurement: sex
            equals: "Male"
          - from_calculation: timedUpAndGoBest
            is_greater_than: 12.0
      show_message:
        text: "Fall risk >12.0 sec (Sn .74, Sp .52)"
        severity: concern

    - when:
        all_of:
          - from_measurement: sex
            equals: "Female"
          - from_calculation: timedUpAndGoBest
            is_greater_than: 12.0
      show_message:
        text: "Fall risk >12.0 sec (Sn .74, Sp .31)"
        severity: concern

    # Frailty
    - when:
        from_calculation: timedUpAndGoBest
        is_at_least: 17.8
      show_message:
        text: "Frailty >=17.8 (Sn .93, Sp .98)"
        severity: concern

    # Mobility classification by age/sex
    - lookup_threshold:
        value_from_calculation: timedUpAndGoBest
        table: timed_up_and_go
        patient_sex_from: measurement.sex
        patient_age_from: calculation.age

timedUpAndGoCognitive:
  label: "Timed Up and Go Cognitive Dual Task"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    - when:
        from_calculation: timedUpAndGoCognitiveBest
        is_missing: true
      then: skip

    # Fall risk (per v2.1 chart)
    - when:
        from_calculation: timedUpAndGoCognitiveBest
        is_greater_than: 11
      show_message:
        text: "Fall risk >11 sec (Sn 1.00, Sp .66)"
        severity: concern

    # Mobility classification by age/sex
    - lookup_threshold:
        value_from_calculation: timedUpAndGoCognitiveBest
        table: timed_up_and_go_cognitive
        patient_sex_from: measurement.sex
        patient_age_from: calculation.age

annualMobilityAssessment:
  label: "Annual Mobility Assessment"
  citation: '<a href="https://aptageriatrics.org/wp-content/uploads/2026/02/AMA-InterpChartsFinalv2.1.pdf" target="_blank" rel="noopener noreferrer">Annual Mobility Assessment</a>'
  rules:
    # Check the vitalSigns interpretation
    - check_interpretation:
        interpretation: vitalSigns
        when_null: skip
        when_message_includes: "This patient is ineligible for physical activity."
        show_message:
          text: "Participants with the following vital sign findings on vital sign testing may not tolerate the intensity of functional testing. Instead of proceeding, thank them for coming to screening, and refer to their primary care provider, cardiologist, or emergency department for follow-up care."
          severity: caution

    # If vitals were acceptable (and no other concerns), patient is eligible for the screening.
    - otherwise:
        show_message:
          text: "This patient is eligible for the Annual Mobility Assessment."
          severity: normal
