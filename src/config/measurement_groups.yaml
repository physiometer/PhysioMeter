# Maps measurements to their summary calculations/interpretations and orders them in the UI.
#
# Fields: key (matches measurement config), name, patient_level (read-only patient attribute),
# calculations, interpretations.
#
# Every calculation and interpretation must appear in exactly one group. Assign interpretations
# to the PRIMARY measurement they relate to, not every measurement they depend on.

- key: name
  name: "Name"
  patient_level: true

- key: dob
  name: "Date of Birth"
  patient_level: true
  calculations:
    - age

- key: sex
  name: "Sex"
  patient_level: true

- key: vitalSigns
  name: "Vital Signs"
  interpretations:
    - vitalSigns
    - annualMobilityAssessment

- key: fiveMeterUsualWalkingSpeed
  name: "5 Meter Usual Walking Speed"
  calculations:
    - fiveMeterUsualWalkingSpeedMean
  interpretations:
    - usualWalkingSpeed

- key: fiveMeterFastWalkingSpeed
  name: "5 Meter Fast Walking Speed"
  calculations:
    - fiveMeterFastWalkingSpeedBest
  interpretations:
    - fastWalkingSpeed

- key: thirtySecondSitToStand
  name: "30 Second Sit to Stand"
  calculations:
    - thirtySecondSitToStandCount
  interpretations:
    - thirtySecondSitToStand

- key: assistiveDevices
  name: "Assistive Device for Four Square Step Test"

- key: fourSquareStepTest
  name: "Four Square Step Test"
  calculations:
    - fourSquareStepTestBest
  interpretations:
    - fourSquareStepTest

- key: modifiedFourSquareStepTest
  name: "Modified Four Square Step Test"
  calculations:
    - modifiedFourSquareStepTestBest
  interpretations:
    - modifiedFourSquareStepTest

- key: timedUpAndGo
  name: "Timed Up and Go"
  calculations:
    - timedUpAndGoBest
  interpretations:
    - timedUpAndGo

- key: timedUpAndGoCognitive
  name: "Timed Up and Go Cognitive"
  calculations:
    - timedUpAndGoCognitiveBest
  interpretations:
    - timedUpAndGoCognitive
